name: Scan Skills

on:
  pull_request:
    paths:
      - "skills/**"
      - "scripts/scan-skills.sh"
      - ".github/skill-scanner-policy.yaml"
      - ".github/workflows/scan-skills.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/scan-skills.sh"
      - ".github/skill-scanner-policy.yaml"
      - ".github/workflows/scan-skills.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  skill-scanner:
    name: Skill Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv (with cache)
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install skill-scanner
        run: uv tool install cisco-ai-skill-scanner

      - name: Run skill-scanner against skills/
        env:
          POLICY: .github/skill-scanner-policy.yaml
        run: ./scripts/scan-skills.sh

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: skill-scanner-results.sarif
